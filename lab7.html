<head>
    <title>Book Search Lab</title>
    <link rel="stylesheet" href="lab7.css">
</head>
<body>
    <h1>Let's Lookup some Books</h1>

    <p>Please enter a book name:</p>
    <form id="searchForm">
        <input type="text" id="bookInput" placeholder="Enter book title" required>
        <button type="submit">Search</button>
    </form>

    <h1 id="loading" style="display: none;">Please wait while we load books</h1>

    <table id="resultsTable" style="display: none;">
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="lab7.js"></script>
</body>
