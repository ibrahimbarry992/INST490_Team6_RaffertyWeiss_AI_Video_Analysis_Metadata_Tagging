<html>
    <head>
        <title>Contact Form</title>
        <style>
            body {
                background-color: honeydew;
            }

            .contactUs {
                background-color: beige;
                margin-top: 100px;
                margin-bottom: 100px;
                margin-right: 150px;
                margin-left: 80px;
            }

            input {
                background-color: orchid;
                color:aliceblue;
            }

            #inquiryDate {
                font-size: 20px;
            }
        </style>
    </head>
    <body>
        <h1>Contact Me!</h1>
        <form name = "contactForm" method = "get" action="lecture2_sucessForm.html">
        <div class = "contactUs">
            <!-- User Name Details -->
            <label for = "firstName">First Name:</label>
            <input type = "text" id = "firstName" required>
            <br>
            <label for = "lastName">Last Name:</label>
            <input type = "text" id = "lastName" required>
            <br><hr>
        </div>

            <!-- Inquiry Date -->
            <label for = "inquiryDate">Inquiry Date: </label>
            <input type = "datetime-local" id = "inquiryDate">
            <br>

            <!-- Inquiry Reason -->
             <label for="reason">Inquiry Type: </label> <br>
             <input type = "radio" name = "reason"> Media Inquiries <br>
             <input type = "radio" name = "reason"> General Inquiries <br>
             <input type = "radio" name = "reason"> Corporate Inquiries <br>
             <br> <hr>

             <!--Address-->
             <h3>Address</h3>
             <label for = "street">Street:</label>
             <input type = "text" id = "street" required> <br>

             <label for = "city">City:</label>
             <input type = "text" id = "city" required> <br>

             <label for = "state">State:</label>
             <input type = "text" id = "state" required> <br>

             <label for = "zip">Zip:</label>
             <input type = "text" id = "zip" required> <br> <hr>


             <!-- University Affiliation-->
             <label for="university">What university are you affiliated with: </label>
             <select id = "university" name = "university">
                <option hidden>-- Select Option --</option>
                <option value = "umd">UMD</option>
                <option value = "umbc">UMBC</option>
                <option value = "other">Other</option>

             </select>
             <br>

             <!--Email -->
             <label for = "email">What is the best email to reach you at?</label>
             <input type = "email" placeholder = "test@gmail.com"> 
             <br> <hr>

             
             <input type = "submit" value = "Send it!">
        </form>
    </body>
</html>
