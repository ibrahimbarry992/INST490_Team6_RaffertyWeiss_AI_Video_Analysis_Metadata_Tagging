<html>
    <head>
        <title>Game Page</title>
        <link rel = "stylesheet" href= "assignment1_page3.css">
    </head>
    <body>
        <header id = "bar">
        <h1>Rock, Paper, Scissors</h1>
        </header>
        <nav id = "main-nav">
            <ul>
                <li><a href = "assignment1_page1.html">Home</a></li>
                <li><a href= "assignment1_page3.html">Games</a></li>
                <li><a href = "assignment1_page2.html">Contact Me!</a></li>
            </ul>
        </nav>
        <hr>
        <form onsubmit=" return game()">
        <select name = "choice" id = "choice">
            <option value = "Rock"> Rock </option>
            <option value = "Paper"> Paper </option>
            <option value = "Scissors"> Scissors </option>
        </select>
        <input type = "submit">
        </form>
        <hr>
        <div class = "left-side">
            <h2 id = "left">You Chose:</h2>
        </div>

        <div class = "right-side">
            <h2 id = "right-side">Computer Chose:</h2>
        </div>

        <!--Footer-->
     <footer id = "bar">
        <p>Copyright of Someone, Somewhere</p>
    </footer>
    </body>
    <script type = "text/javascript">
        let arr = ["Rock", "Paper", "Scissors", "Spock"]
        function game(){
            let user_output = document.getElementById("choice").value;
            document.getElementById("left").innerHTML = "You Chose: " + user_output;
            let comp_output = arr[Math.floor(Math.random() * arr.length)];
            document.getElementById("right-side").innerHTML = "Computer Chose: " + comp_output;

            if (user_output == comp_output) {
                alert('TIE!')
                document.body.style.backgroundColor = 'blue';
                return false;
            } 
            else if(user_output == "Rock"){
                if(comp_output == "Paper" || comp_output == "Spock"){
                    alert('You lose :(');
                    document.body.style.backgroundColor = 'red';
                }
                else{
                    alert('You win!');
                    document.body.style.backgroundColor = 'green';
                }
                return false;
            }
            else if(user_output == "Scissors"){
                if(comp_output == "Rock" || comp_output == "Spock"){
                    alert('You lose :(');
                    document.body.style.backgroundColor = 'red';
                }
                else{
                    alert('You win!');
                    document.body.style.backgroundColor = 'green';
                }
                return false;
            }
            else if(user_output == "Paper"){
                if(comp_output == "Scissors" || comp_output == "Spock"){
                    alert('You lose :(');
                    document.body.style.backgroundColor = 'red';
                }
                else{
                    alert('You win!');
                    document.body.style.backgroundColor = 'green';
                }
                return false;
            }
            
        }
        
            

        

       
        
    </script>

</html>
