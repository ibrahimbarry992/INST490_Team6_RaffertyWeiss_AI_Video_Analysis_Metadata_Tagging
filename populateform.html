<html>
    <head>
        <title>Populate Form</title>
        <script defer src = "populateform.js"></script>
    </head>
    <body>
        <h1>form options</h1>
        <form method = "get" action = "https://inst377-lab4-server.vercel.app/api/product">
            <label for = "name">Name: </label>
            <input type = "text" name = "name">
            <br>
            <label for = "productId">Product: </label>
            <select id = "productId" name = "productId">

            </select>
            <input type = "submit">

        </form>
        <form onsubmit="addObject(); return false">
            <label for = "productName">Product Name:</label>
            <input type = "text" name = "name" id = "productName">
            <br>
            <label for = "productPrice">Product Price:</label>
            <input type = "number" name = "price" id = "productPrice">
            <br>
            <label for = "productYear">Product Year:</label>
            <input type = "number" name = "year" id = "productYear">
            <input type = "submit">
        </form>
    </body>
</html>
