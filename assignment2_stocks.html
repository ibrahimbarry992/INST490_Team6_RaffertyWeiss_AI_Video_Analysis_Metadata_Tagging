<html>
    <head>
        <title>Stocks Page</title>
        <link rel="stylesheet" href="stocks.css">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/annyang/2.6.1/annyang.min.js"></script>
        <script defer src="stocks.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    </head>
    <body>
        <nav>
            <ul>
                <li><a href="assignment2_homepage.html">Home</a></li>
                <li><a href="assignment2_stocks.html">Stocks</a></li>
                <li><a href="assignment2_dogs.html">Dogs</a></li>
            </ul>
        </nav>
    
        <main>
            <h1>INST377 - Activities</h1>
            <p>Let's chart some stocks!</p>
    
            <!-- Stock Lookup Form -->
            <form id="stock-form">
                <input type="text" id="stock-ticker" placeholder="Enter Stock Ticker" required>
                <select id="stock-days">
                    <option value="30">30 Days</option>
                    <option value="60">60 Days</option>
                    <option value="90">90 Days</option>
                </select>
                <button type="submit">Lookup</button>
            </form>
    
            <!-- Chart Section -->
            <canvas id="stock-chart"></canvas>
    
            <!-- Top 5 Stocks Table -->
            <h2>Top 5 Stocks</h2>
            <table id="top-stocks-table">
                <thead>
                    <tr>
                        <th>TICKER</th>
                        <th>COMMENT COUNT</th>
                        <th>SENTIMENT</th>
                    </tr>
                </thead>
                <tbody id="top-stocks">
                </tbody>
            </table>
            <!-- Instructions -->
        <section class="instructions">
            <h2>In this web page there are options to Navigate using Audio!</h2>
            <p>
                Ensure your mic is enabled to be able to use this feature:
                <ul>
                    <li>Look up stock &lt;stock name here&gt;</li>
                </ul>
            </p>
            <button id="audio-on">Turn On Listening</button>
            <button id="audio-off">Turn Off Listening</button>
        </section>
        </main>
    </body>
</html>
