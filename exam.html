<html>
    <head>
        <link rel = "stylesheet" href= "exam.css">
    </head>
    <body>
        <h1 id = "header">Midterm Season makes me feel like:</h1>
        <p>Click here to see!</p>
        
        <input type = "button" value = "change color" id = "press" onclick = "rand_color()">
       
        <script type = "text/javascript">
            function rand_color(){
                const color_array = ['blue', 'red', 'green', 'yellow', 'orange', 'purple', 'pink']
                const rand_element = color_array[Math.floor(Math.random() * color_array.length)]
                const header = document.getElementById("header")
                header.style.backgroundColor = rand_element 
            }
                
        </script>
    </body>
</html>
